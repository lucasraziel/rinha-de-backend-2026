worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    keepalive_timeout 65;
    keepalive_requests 10000;
    tcp_nodelay on;
    tcp_nopush on;

    # Upstream over Unix domain sockets — skips the TCP/IP stack between
    # nginx and the api processes. The two .sock files are created by the
    # api containers in the shared `uds` volume mounted at /run/uds.
    upstream api {
        server unix:/run/uds/api1.sock max_fails=0;
        server unix:/run/uds/api2.sock max_fails=0;
        keepalive 64;
    }

    server {
        listen 9999 default_server reuseport;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
