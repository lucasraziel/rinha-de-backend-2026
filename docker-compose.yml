## Rinha 2026 — submission
## total budget: 1.0 CPU + 350 MB RAM
## image: lucasraziel/rinha2026-api:c9cde830b2fb08c303ca71ce01c5803f586563d7
## Topology: nginx ↔ api1/api2 over Unix domain sockets (shared volume `uds`).

services:
  api1:
    image: lucasraziel/rinha2026-api:c9cde830b2fb08c303ca71ce01c5803f586563d7
    environment:
      SOCKET_PATH: "/run/uds/api1.sock"
      NPROBE: "16"
      USE_IVF: "true"
    volumes:
      - uds:/run/uds
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"

  api2:
    image: lucasraziel/rinha2026-api:c9cde830b2fb08c303ca71ce01c5803f586563d7
    environment:
      SOCKET_PATH: "/run/uds/api2.sock"
      NPROBE: "16"
      USE_IVF: "true"
    volumes:
      - uds:/run/uds
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    depends_on:
      - api1

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - uds:/run/uds
    ports:
      - "9999:9999"
    networks:
      - rinha
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "25M"

volumes:
  uds:

networks:
  rinha:
    driver: bridge
