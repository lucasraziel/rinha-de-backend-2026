## Rinha 2026 — total budget across all services: 1.0 CPU + 350 MB RAM.
## Split: nginx 0.10 / 25 MB; api1 0.45 / 160 MB; api2 0.45 / 160 MB.
##
## T4: nginx ↔ api over Unix domain sockets via the `uds` shared volume.
## Eliminates loopback TCP round-trip on every request.

services:
  api1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lucasraziel/rinha2026-api:dev
    environment:
      SOCKET_PATH: "/run/uds/api1.sock"
      NPROBE: "16"
      USE_IVF: "true"
    volumes:
      - uds:/run/uds
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"

  api2:
    image: lucasraziel/rinha2026-api:dev
    environment:
      SOCKET_PATH: "/run/uds/api2.sock"
      NPROBE: "16"
      USE_IVF: "true"
    volumes:
      - uds:/run/uds
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    depends_on:
      - api1

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - uds:/run/uds
    ports:
      - "9999:9999"
    networks:
      - rinha
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "25M"

volumes:
  uds:

networks:
  rinha:
    driver: bridge
