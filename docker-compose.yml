## Rinha 2026 — submission
## total budget: 1.0 CPU + 350 MB RAM
## image: lucasraziel/rinha2026-api:5751d70be02000c269ba09ee23e7a19ca065f3b6

services:
  api1:
    image: lucasraziel/rinha2026-api:5751d70be02000c269ba09ee23e7a19ca065f3b6
    environment:
      PORT: "9000"
      NPROBE: "16"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"

  api2:
    image: lucasraziel/rinha2026-api:5751d70be02000c269ba09ee23e7a19ca065f3b6
    environment:
      PORT: "9000"
      NPROBE: "16"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    depends_on:
      - api1

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    networks:
      - rinha
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "25M"

networks:
  rinha:
    driver: bridge
