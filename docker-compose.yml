## Rinha 2026 — total budget across all services: 1.0 CPU + 350 MB RAM.
## Split: nginx 0.10 / 25 MB; api1 0.45 / 160 MB; api2 0.45 / 160 MB.

services:
  api1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lucasraziel/rinha2026-api:dev
    environment:
      PORT: "9000"
      NPROBE: "16"
      # T3: bypass IVF, faz brute-force exato (linear scan dos 91 MB f16)
      # com SIMD AVX2/F16C. Em hardware com cache pequeno (Haswell L3 = 3MB)
      # e DDR3, o linear scan tira proveito do prefetcher e tende a ser tão
      # ou mais rápido que IVF (random jumps entre 1024 clusters → cache miss).
      # Bonus: detection 100% exata (0 FP/FN/Err esperado).
      USE_IVF: "false"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"

  api2:
    image: lucasraziel/rinha2026-api:dev
    environment:
      PORT: "9000"
      NPROBE: "16"
      USE_IVF: "false"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    depends_on:
      - api1

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    networks:
      - rinha
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "25M"

networks:
  rinha:
    driver: bridge
