## Rinha 2026 — total budget across all services: 1.0 CPU + 350 MB RAM.
## Split: nginx 0.10 / 25 MB; api1 0.45 / 160 MB; api2 0.45 / 160 MB.

services:
  api1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lucasraziel/rinha2026-api:dev
    environment:
      PORT: "9000"
      # nprobe = how many of the 1024 IVF clusters we scan per query.
      # Sweet spot validated by CI bench: nprobe=16 → p99 0.76ms, score 5687.
      # Tried nprobe=32: p99 collapsed to 30ms under 900 RPS due to scheduler
      # backpressure even though throughput should have been fine — the win
      # in detection (4 vs 6 FP/FN) didn't offset the score_p99 loss.
      NPROBE: "16"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"

  api2:
    image: lucasraziel/rinha2026-api:dev
    environment:
      PORT: "9000"
      NPROBE: "16"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    depends_on:
      - api1

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    networks:
      - rinha
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "25M"

networks:
  rinha:
    driver: bridge
