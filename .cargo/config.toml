# Build flags applied when targeting linux/amd64 (the Rinha 2026 evaluator runs on
# a Mac Mini Late 2014 with i5-4278U: Haswell — AVX2 + BMI2 + F16C, no AVX-512).
# Local builds on macOS / aarch64 use the default flags.
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "link-arg=-fuse-ld=lld",
]

[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-cpu=x86-64-v3",
]
